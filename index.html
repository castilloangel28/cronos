<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRONOS - Nakama Realtime Neon</title>
    <!-- Importación de Google Fonts: Orbitron, Rajdhani y Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Montserrat', sans-serif;
            /* Fondo ultra oscuro con silueta temática de One Piece en el centro */
            background: linear-gradient(rgba(0, 0, 0, 0.93), rgba(5, 5, 10, 0.97)), 
                        url('https://images8.alphacoders.com/134/1345917.png') no-repeat center center fixed;
            background-size: cover;
            color: #00f3ff; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            box-sizing: border-box;
            text-shadow: 0 0 5px #00f3ff;
        }
        
        /* Contenedor con super resplandor Neón Cian */
        .container { 
            background-color: rgba(5, 5, 12, 0.9); 
            padding: 30px; 
            border-radius: 20px; 
            border: 3px solid #00f3ff;
            box-shadow: 0 0 20px #00f3ff, inset 0 0 15px rgba(0, 243, 255, 0.3); 
            max-width: 450px; 
            width: 100%; 
            text-align: center;
            backdrop-filter: blur(10px);
            margin: auto;
        }
        
        /* Título Principal usando Orbitron - Neón Magenta Intenso */
        h1 { 
            font-family: 'Orbitron', sans-serif;
            color: #ff0055; 
            margin-bottom: 2px; 
            letter-spacing: 5px; 
            font-size: 38px;
            text-shadow: 0 0 10px #ff0055, 0 0 25px #ff0055, 0 0 50px #ff0055;
            font-weight: 900;
        }
        
        .subtitle { 
            font-family: 'Rajdhani', sans-serif;
            color: #00f3ff; 
            font-size: 16px; 
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00f3ff;
        }
        
        #loginSection { display: block; }
        
        /* Input del PIN - Neón Morado con letras Neón Cian */
        .pin-input { 
            font-family: 'Montserrat', sans-serif;
            font-size: 26px; 
            text-align: center; 
            letter-spacing: 12px; 
            padding: 12px; 
            width: 85%; 
            border-radius: 10px; 
            border: 2px solid #9d00ff; 
            background-color: #000;
            color: #00f3ff;
            margin-top: 15px; 
            box-shadow: 0 0 15px #9d00ff, inset 0 0 5px #9d00ff;
            outline: none;
            text-shadow: 0 0 10px #00f3ff;
        }
        .pin-input:focus {
            border-color: #ff0055;
            box-shadow: 0 0 20px #ff0055;
            color: #ff0055;
            text-shadow: 0 0 10px #ff0055;
        }
        
        #mainSection { display: none; }
        
        /* Bienvenida usando Rajdhani - Neón Verde Lima */
        .bienvenida { 
            font-family: 'Rajdhani', sans-serif;
            color: #39ff14; 
            font-weight: bold; 
            margin-bottom: 25px; 
            font-size: 22px; 
            text-shadow: 0 0 10px #39ff14, 0 0 20px #39ff14;
            letter-spacing: 1px;
        }
        
        label { 
            font-family: 'Rajdhani', sans-serif;
            display: block; 
            text-align: left; 
            font-weight: bold; 
            margin-top: 18px; 
            color: #00f3ff; 
            text-shadow: 0 0 10px #00f3ff;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        /* Selectores - Todo Neón Morado y letras brillantes */
        select { 
            font-family: 'Montserrat', sans-serif;
            width: 100%; 
            padding: 12px; 
            margin-top: 6px; 
            border-radius: 10px; 
            font-size: 15px; 
            box-sizing: border-box; 
            outline: none;
            background-color: #000;
            color: #00f3ff;
            border: 2px solid #9d00ff;
            box-shadow: 0 0 12px #9d00ff;
            cursor: pointer;
            font-weight: bold;
            text-shadow: 0 0 5px #00f3ff;
        }
        select option {
            background-color: #000;
            color: #00f3ff;
        }
        select:disabled {
            background-color: #111;
            border-color: #333;
            color: #444;
            box-shadow: none;
            text-shadow: none;
        }
        
        /* Botón de Entrada General Neón */
        .btn-neon { 
            font-family: 'Rajdhani', sans-serif;
            width: 100%; 
            padding: 14px; 
            margin-top: 30px; 
            border-radius: 10px; 
            font-size: 18px; 
            box-sizing: border-box; 
            background-color: transparent; 
            color: #ffaa00; 
            border: 2px solid #ffaa00; 
            font-weight: bold; 
            cursor: pointer; 
            letter-spacing: 3px;
            text-shadow: 0 0 10px #ffaa00;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.5);
            transition: all 0.3s ease;
        }
        .btn-neon:hover { 
            background-color: #ffaa00;
            color: #000;
            box-shadow: 0 0 25px #ffaa00;
            text-shadow: none;
        }
        
        /* Bloque de Respuestas en Tiempo Real */
        .resultados { 
            margin-top: 30px; 
            padding-top: 20px; 
            border-top: 2px dashed #9d00ff; 
            text-align: left; 
            display: none; 
        }
        .resultado-item { 
            font-family: 'Rajdhani', sans-serif;
            margin-bottom: 14px; 
            font-size: 19px; 
            color: #00f3ff;
            text-shadow: 0 0 8px #00f3ff;
            letter-spacing: 1px;
        }
        /* Valores numéricos resaltados en Neón Magenta gigante usando Orbitron */
        .resultado-val { 
            font-family: 'Orbitron', sans-serif;
            font-weight: bold; 
            color: #ff0055; 
            float: right; 
            text-shadow: 0 0 12px #ff0055, 0 0 25px #ff0055;
            font-size: 22px;
        }
        
        #loading { 
            font-family: 'Rajdhani', sans-serif;
            color: #ffaa00; 
            font-weight: bold; 
            margin-bottom: 15px; 
            display: none; 
            text-shadow: 0 0 10px #ffaa00;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CRONOS</h1>
    <div class="subtitle">Nakama Realtime</div>

    <!-- SECCIÓN 1: LOGIN POR PIN -->
    <div id="loginSection">
        <label style="text-align: center;" for="userPin">Ingrese su PIN de Tripulación</label>
        <input type="password" id="userPin" class="pin-input" maxlength="4" placeholder="••••">
        <button class="btn-neon" onclick="verificarAcceso()">INGRESAR</button>
    </div>

    <!-- SECCIÓN 2: BUSCADOR PRINCIPAL (TIEMPO REAL) -->
    <div id="mainSection">
        <div id="msgBienvenida" class="bienvenida"></div>
        <div id="loading">Sincronizando Bitácora Marina...</div>

        <label for="estilo">Estilo</label>
        <select id="estilo" onchange="actualizarTallas()" disabled>
            <option value="">Seleccione un estilo...</option>
        </select>

        <label for="talla">Talla</label>
        <select id="talla" onchange="actualizarOperaciones()" disabled>
            <option value="">Seleccione una talla...</option>
        </select>

        <!-- Al cambiar la operación calcula en tiempo real de inmediato -->
        <label for="operacion">Operación</label>
        <select id="operacion" onchange="calcularMetasTiempoReal()" disabled>
            <option value="">Seleccione una operación...</option>
        </select>

        <!-- RESULTADOS AUTOMÁTICOS ASÍNCRONOS -->
        <div id="resultados" class="resultados">
            <div class="resultado-item">Meta por Turno: <span id="resMeta" class="resultado-val">0</span> docenas</div>
            <div class="resultado-item">Docenas por Hora: <span id="resDozenHora" class="resultado-val">0</span> dz/hr</div>
            <div class="resultado-item">Piezas por Minuto: <span id="resPzasMin" class="resultado-val">0</span> pzas/min</div>
        </div>
    </div>
</div>

<script>
const SHEET_ID = '1SBsIDmwEZTarfIvZsuOl1nTC0AbkIDZa'; 

let bddMetas = [];
const HORAS_TURNO = 9;

const usuariosAutorizados = [
    { pin: "2004", nombre: "Angel Castillo" },
    { pin: "5863", nombre: "Kevin Ramón Pineda" },
    { pin: "8198", nombre: "Carlos David Garcia 🦅" },
    { pin: "1734", nombre: "Libny Castillo" },
    { pin: "4321", nombre: "Derick Alexander Carvajal" },
    { pin: "3455", nombre: "Josué Rivera" },
    { pin: "1301", nombre: "Jack Perdomo" },
    { pin: "2064", nombre: "Arnoldo Alvarenga🤠" },
    { pin: "2711", nombre: "Yervi Mejia" },
    { pin: "3855", nombre: "Yeison Murillo" },
    { pin: "5037", nombre: "Kevin Díaz" },
    { pin: "4005", nombre: "Erik Rosales" },
    { pin: "1507", nombre: "Fernando Sanchez" },
    { pin: "3307", nombre: "Edwin Alvarado" },
    { pin: "3310", nombre: "Angel Flores" },
    { pin: "1800", nombre: "Usuario Invitado" }
];

function verificarAcceso() {
    const pinIngresado = document.getElementById('userPin').value;
    const usuario = usuariosAutorizados.find(u => u.pin === pinIngresado);

    if (usuario) {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('mainSection').style.display = 'block';
        document.getElementById('msgBienvenida').innerText = `¡Al abordaje, Nakama ${usuario.nombre}!`;
        conectarConGoogleSheets();
    } else {
        alert("PIN incorrecto. Intente de nuevo.");
        document.getElementById('userPin').value = "";
    }
}

function conectarConGoogleSheets() {
    document.getElementById('loading').style.display = 'block';
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Produccion`;

    fetch(url)
        .then(res => res.text())
        .then(data => {
            const jsonText = data.substring(47, data.length - 2);
            const json = JSON.parse(jsonText);
            const filas = json.table.rows;

            bddMetas = filas.map(f => ({
                estilo: f.c[0] ? f.c[0].v.toString().trim() : '',
                talla: f.c[1] ? f.c[1].v.toString().trim() : '',
                operacion: f.c[3] ? f.c[3].v.toString().trim() : '',
                metaDocenas: f.c[5] ? parseFloat(f.c[5].v) : 0
            })).filter(item => item.estilo !== "ESTILO");

            document.getElementById('loading').style.display = 'none';
            inicializarEstilos();
        })
        .catch(err => {
            alert("Error de conexión con la base de datos.");
            console.error(err);
        });
}

function inicializarEstilos() {
    const comboEstilo = document.getElementById('estilo');
    comboEstilo.innerHTML = '<option value="">Seleccione un estilo...</option>';
    comboEstilo.disabled = false;
    
    const estilosUnicos = [...new Set(bddMetas.map(item => item.estilo).filter(Boolean))];
    estilosUnicos.sort().forEach(estilo => {
        let opt = document.createElement('option');
        opt.value = estilo; opt.innerHTML = estilo;
        comboEstilo.appendChild(opt);
    });
}

function actualizarTallas() {
    const estiloSel = document.getElementById('estilo').value;
    const comboTalla = document.getElementById('talla');
    const comboOperacion = document.getElementById('operacion');
    const divResultados = document.getElementById('resultados');
    
    comboTalla.innerHTML = '<option value="">Seleccione una talla...</option>';
    comboOperacion.innerHTML = '<option value="">Seleccione una operación...</option>';
    comboOperacion.disabled = true;
    divResultados.style.display = "none";

    if(estiloSel) {
        comboTalla.disabled = false;
        const tallasFiltradas = [...new Set(bddMetas.filter(item => item.estilo === estiloSel).map(item => item.talla).filter(Boolean))];
        tallasFiltradas.sort().forEach(talla => {
            let opt = document.createElement('option');
            opt.value = talla; opt.innerHTML = talla;
            comboTalla.appendChild(opt);
        });
    } else { comboTalla.disabled = true; }
}

function actualizarOperaciones() {
    const estiloSel = document.getElementById('estilo').value;
    const tallaSel = document.getElementById('talla').value;
    const comboOperacion = document.getElementById('operacion');
    const divResultados = document.getElementById('resultados');
    
    comboOperacion.innerHTML = '<option value="">Seleccione una operación...</option>';
    divResultados.style.display = "none";

    if(tallaSel) {
        comboOperacion.disabled = false;
        const operacionesFiltradas = [...new Set(bddMetas.filter(item => item.estilo === estiloSel && item.talla === tallaSel).map(item => item.operacion).filter(Boolean))];
        operacionesFiltradas.sort().forEach(op => {
            let opt = document.createElement('option');
            opt.value = op; opt.innerHTML = op;
            comboOperacion.appendChild(opt);
        });
    } else { comboOperacion.disabled = true; }
}

function calcularMetasTiempoReal() {
    const e = document.getElementById('estilo').value;
    const t = document.getElementById('talla').value;
    const o = document.getElementById('operacion').value;
    const divResultados = document.getElementById('resultados');

    if(!e || !t || !o) { 
        divResultados.style.display = "none";
        return; 
    }

    const registro = bddMetas.find(item => item.get && item.estilo === e && item.talla === t && item.operacion === o || item.estilo === e && item.talla === t && item.operacion === o);

    if(registro) {
        const metaDocenas = registro.metaDocenas;
        const docenasPorHora = (metaDocenas / HORAS_TURNO).toFixed(2);
        const piezasPorMinuto = ((metaDocenas * 12) / (HORAS_TURNO * 60)).toFixed(2);

        document.getElementById('resMeta').innerText = metaDocenas;
        document.getElementById('resDozenHora').innerText = docenasPorHora;
        document.getElementById('resPzasMin').innerText = piezasPorMinuto;
        divResultados.style.display = "block";
    } else {
        divResultados.style.display = "none";
    }
}
</script>
</body>
</html>
