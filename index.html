<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRONOS -🧭 The Log Pose BD🧭 Neon</title>
    <!-- Importación de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #0d0d26 0%, #020208 100%);
            color: #00f3ff; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            box-sizing: border-box;
            text-shadow: 0 0 5px #00f3ff;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
        }

        .container { 
            background-color: rgba(4, 4, 10, 0.92); 
            padding: 30px; 
            border-radius: 20px; 
            border: 3px solid #00f3ff;
            box-shadow: 0 0 25px #00f3ff, inset 0 0 20px rgba(0, 243, 255, 0.2); 
            max-width: 450px; 
            width: 100%; 
            text-align: center;
            backdrop-filter: blur(10px);
            margin: auto;
            position: relative;
            overflow: hidden;
        }

        .container::after {
            content: "☠️";
            position: absolute;
            bottom: -30px;
            right: -20px;
            font-size: 140px;
            opacity: 0.06;
            color: #ffaa00;
            transform: rotate(-15deg);
            pointer-events: none;
            filter: drop-shadow(0 0 10px #ffaa00);
        }

        /* --- ANIMACIÓN DEL BARCO PIRATA MUGIWARA --- */
        .pirate-ship-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 10px auto;
            animation: floatShip 4s ease-in-out infinite;
            filter: drop-shadow(0 0 8px #ffaa00);
        }

        @keyframes floatShip {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        .strawhat-flag {
            animation: waveFlag 0.8s ease-in-out infinite alternate;
            transform-origin: left center;
        }

        @keyframes waveFlag {
            0% { transform: skewY(-2deg) scaleX(0.95); }
            100% { transform: skewY(4deg) scaleX(1.05); }
        }
        /* ------------------------------------------- */

        h1 { 
            font-family: 'Orbitron', sans-serif;
            color: #ff0055; 
            margin-bottom: 2px; 
            letter-spacing: 5px; 
            font-size: 38px;
            text-shadow: 0 0 10px #ff0055, 0 0 25px #ff0055, 0 0 50px #ff0055;
            font-weight: 900;
        }

        .subtitle { 
            font-family: 'Rajdhani', sans-serif;
            color: #00f3ff; 
            font-size: 16px; 
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00f3ff;
        }

        #loginSection { display: block; position: relative; z-index: 2; }

        .pin-input { 
            font-family: 'Montserrat', sans-serif;
            font-size: 26px; 
            text-align: center; 
            letter-spacing: 12px; 
            padding: 12px; 
            width: 85%; 
            border-radius: 10px; 
            border: 2px solid #9d00ff; 
            background-color: #000;
            color: #00f3ff;
            margin-top: 15px; 
            box-shadow: 0 0 15px #9d00ff, inset 0 0 5px #9d00ff;
            outline: none;
            text-shadow: 0 0 10px #00f3ff;
        }
        .pin-input:focus {
            border-color: #ff0055;
            box-shadow: 0 0 20px #ff0055;
            color: #ff0055;
            text-shadow: 0 0 10px #ff0055;
        }

        #mainSection { display: none; position: relative; z-index: 2; }

        .bienvenida { 
            font-family: 'Rajdhani', sans-serif;
            color: #39ff14; 
            font-weight: bold; 
            margin-bottom: 25px; 
            font-size: 22px; 
            text-shadow: 0 0 10px #39ff14, 0 0 20px #39ff14;
            letter-spacing: 1px;
        }

        label { 
            font-family: 'Rajdhani', sans-serif;
            display: block; 
            text-align: left; 
            font-weight: bold; 
            margin-top: 18px; 
            color: #00f3ff; 
            text-shadow: 0 0 10px #00f3ff;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        select { 
            font-family: 'Montserrat', sans-serif;
            width: 100%; 
            padding: 12px; 
            margin-top: 6px; 
            border-radius: 10px; 
            font-size: 15px; 
            box-sizing: border-box; 
            outline: none;
            background-color: #000;
            color: #00f3ff;
            border: 2px solid #9d00ff;
            box-shadow: 0 0 12px #9d00ff;
            cursor: pointer;
            font-weight: bold;
            text-shadow: 0 0 5px #00f3ff;
        }
        select option {
            background-color: #000;
            color: #00f3ff;
        }
        select:disabled {
            background-color: #111;
            border-color: #333;
            color: #444;
            box-shadow: none;
            text-shadow: none;
        }

        .btn-neon { 
            font-family: 'Rajdhani', sans-serif;
            width: 100%; 
            padding: 14px; 
            margin-top: 30px; 
            border-radius: 10px; 
            font-size: 18px; 
            box-sizing: border-box; 
            background-color: transparent; 
            color: #ffaa00; 
            border: 2px solid #ffaa00; 
            font-weight: bold; 
            cursor: pointer; 
            letter-spacing: 3px;
            text-shadow: 0 0 10px #ffaa00;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.5);
            transition: all 0.3s ease;
        }
        .btn-neon:hover { 
            background-color: #ffaa00;
            color: #000;
            box-shadow: 0 0 25px #ffaa00;
            text-shadow: none;
        }

        .resultados { 
            margin-top: 30px; 
            padding-top: 20px; 
            border-top: 2px dashed #9d00ff; 
            text-align: left; 
            display: none; 
        }
        .resultado-item { 
            font-family: 'Rajdhani', sans-serif;
            margin-bottom: 14px; 
            font-size: 19px; 
            color: #00f3ff;
            text-shadow: 0 0 8px #00f3ff;
            letter-spacing: 1px;
        }
        .resultado-val { 
            font-family: 'Orbitron', sans-serif;
            font-weight: bold; 
            color: #ff0055; 
            float: right; 
            text-shadow: 0 0 12px #ff0055, 0 0 25px #ff0055;
            font-size: 22px;
        }

        #loading { 
            font-family: 'Rajdhani', sans-serif;
            color: #ffaa00; 
            font-weight: bold; 
            margin-bottom: 15px; 
            display: none; 
            text-shadow: 0 0 10px #ffaa00;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- SVG Vectorial del Barco Pirata con la Bandera de Sombrero de Paja -->
    <div class="pirate-ship-container">
        <svg viewBox="0 0 100 100" width="100%" height="100%">
            <!-- Mar/Olas pequeñas de apoyo -->
            <path d="M20 85 Q 35 80, 50 85 T 80 85" fill="none" stroke="#00f3ff" stroke-width="2" opacity="0.4"/>
            
            <!-- Casco del Barco -->
            <path d="M25 65 L 30 80 Q 50 85, 70 80 L 78 65 Z" fill="#5c4033" stroke="#ffaa00" stroke-width="1.5" />
            <path d="M 23 65 L 79 65" fill="none" stroke="#ffaa00" stroke-width="2"/>
            
            <!-- Mástil Principal -->
            <line x1="50" y1="20" x2="50" y2="65" stroke="#ffaa00" stroke-width="3"/>
            
            <!-- Bandera de los Mugiwara (Con animación de oleaje) -->
            <g class="strawhat-flag">
                <!-- Fondo de la Bandera negra -->
                <rect x="52" y="22" width="34" height="22" fill="#111" rx="2" stroke="#fff" stroke-width="0.5"/>
                
                <!-- Calavera (Base) -->
                <circle cx="67" cy="31" r="5" fill="#fff" />
                <rect x="65" y="34" width="4" height="4" fill="#fff" rx="1"/>
                <!-- Ojos de la Calavera -->
                <circle cx="65.5" cy="30.5" r="1.2" fill="#000" />
                <circle cx="68.5" cy="30.5" r="1.2" fill="#000" />
                <!-- Huesos Cruzados de fondo -->
                <path d="M56 25 L 78 39 M 56 39 L 78 25" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
                
                <!-- Sombrero de Paja icónico de Luffy -->
                <path d="M59 28 Q 67 24, 75 28" fill="none" stroke="#ffcc00" stroke-width="3" stroke-linecap="round"/>
                <path d="M63 27 Q 67 21, 71 27" fill="#ffcc00"/>
                <!-- Cinta roja del sombrero -->
                <path d="M63 26 Q 67 24, 71 26" fill="none" stroke="#ff0000" stroke-width="1"/>
            </g>
            
            <!-- Velas del barco recogidas/decorativas -->
            <path d="M35 35 Q 45 32, 48 38 Q 42 48, 35 35" fill="#eee" opacity="0.8"/>
            <path d="M52 48 Q 58 42, 68 45 Q 60 55, 52 48" fill="#eee" opacity="0.8"/>
        </svg>
    </div>

    <h1>⚓ CRONOS ⚓</h1>
    <div class="subtitle">🏴‍☠️ THE METALOGPOSE 🏴‍☠️</div>

    <!-- SECCIÓN 1: LOGIN POR PIN -->
    <div id="loginSection">
        <label style="text-align: center;" for="userPin">🔑 Ingrese su PIN de Nōryoku-sha  🔑</label>
        <input type="password" id="userPin" class="pin-input" maxlength="4" placeholder="••••">
        <button class="btn-neon" onclick="verificarAcceso()">⛵ Ikuzo Mugiwara! ⚔️</button>
    </div>

    <!-- SECCIÓN 2: BUSCADOR PRINCIPAL (TIEMPO REAL) -->
    <div id="mainSection">
        <div id="msgBienvenida" class="bienvenida"></div>
        <div id="loading">🌊 Sincronizando Bitácora GrandLine...</div>

        <label for="estilo">🎽 Estilo (Logpose)</label>
        <select id="estilo" onchange="actualizarTallas()" disabled>
            <option value="">🏴‍☠️ Seleccione un estilo...</option>
        </select>

        <label for="talla">🍈 Talla (Medida)</label>
        <select id="talla" onchange="actualizarOperaciones()" disabled>
            <option value="">⚔️ Seleccione una talla...</option>
        </select>

        <label for="operacion">⚙️ Operación (Combate)</label>
        <select id="operacion" onchange="calcularMetasTiempoReal()" disabled>
            <option value="">☠️ Seleccione una operación...</option>
        </select>

        <!-- RESULTADOS AUTOMÁTICOS ASÍNCRONOS -->
        <div id="resultados" class="resultados">
            <div class="resultado-item">👑 Meta por Turno: <span id="resMeta" class="resultado-val">0</span> dz</div>
            <div class="resultado-item">⏱️ Docenas por Hora: <span id="resDozenHora" class="resultado-val">0</span> dz/hr</div>
            <div class="resultado-item">🔥 Piezas por Minuto: <span id="resPzasMin" class="resultado-val">0</span> pz/min</div>
        </div>
    </div>
</div>

<script>
const SHEET_ID = '1SBsIDmwEZTarfIvZsuOl1nTC0AbkIDZa'; 

let bddMetas = [];
const HORAS_TURNO = 11;

// Usuarios autorizados con sus emojis insignia de la tripulación
const usuariosAutorizados = [
    { pin: "2004", nombre: "Angel Castillo 𓊝" },
    { pin: "5863", nombre: "Kevin Ramón Pineda ⚔️" },
    { pin: "8198", nombre: "Carlos David Garcia 🦅" },
    { pin: "1734", nombre: "Libny Castillo ⚡" },
    { pin: "4321", nombre: "Derick Alexander Carvajal 🔥" },
    { pin: "3455", nombre: "Josué Rivera 🌀" },
    { pin: "1301", nombre: "Jack Perdomo 🦈" },
    { pin: "2064", nombre: "Arnoldo Alvarenga🤠" },
    { pin: "2711", nombre: "Yervi Mejia 🐯" },
    { pin: "3855", nombre: "Yeison Murillo 💀" },
    { pin: "5037", nombre: "Kevin Díaz 🍃" },
    { pin: "4005", stroke: "", nombre: "Erik Rosales ❄️" },
    { pin: "1507", nombre: "Fernando Sanchez 🦾" },
    { pin: "3307", nombre: "Edwin Alvarado 👑" },
    { pin: "3310", nombre: "Angel Flores 🏹" },
    { pin: "1800", nombre: "Usuario Invitado 🗺️" }
];

function verificarAcceso() {
    const pinIngresado = document.getElementById('userPin').value;
    const usuario = usuariosAutorizados.find(u => u.pin === pinIngresado);

    if (usuario) {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('mainSection').style.display = 'block';
        document.getElementById('msgBienvenida').innerText = `🏴‍☠️ ¡Al abordaje, Nōryoku-sha! ${usuario.nombre}!`;
        conectarConGoogleSheets();
    } else {
        alert("❌ ¡PIN incorrecto, marinero! Intente de nuevo.");
        document.getElementById('userPin').value = "";
    }
}

function conectarConGoogleSheets() {
    document.getElementById('loading').style.display = 'block';
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Produccion`;

    fetch(url)
        .then(res => res.text())
        .then(data => {
            const jsonText = data.substring(47, data.length - 2);
            const json = JSON.parse(jsonText);
            const filas = json.table.rows;

            bddMetas = filas.map(f => ({
                estilo: f.c[0] ? f.c[0].v.toString().trim() : '',
                talla: f.c[1] ? f.c[1].v.toString().trim() : '',
                operacion: f.c[3] ? f.c[3].v.toString().trim() : '',
                metaDocenas: f.c[5] ? parseFloat(f.c[5].v) : 0
            })).filter(item => item.estilo !== "ESTILO");

            document.getElementById('loading').style.display = 'none';
            inicializarEstilos();
        })
        .catch(err => {
            alert("❌ Error de comunicación con el barco base.");
            console.error(err);
        });
}

function inicializarEstilos() {
    const comboEstilo = document.getElementById('estilo');
    comboEstilo.innerHTML = '<option value="">🗺️ Seleccione un estilo...</option>';
    comboEstilo.disabled = false;

    const estilosUnicos = [...new Set(bddMetas.map(item => item.estilo).filter(Boolean))];
    estilosUnicos.sort().forEach(estilo => {
        let opt = document.createElement('option');
        opt.value = estilo; opt.innerHTML = `👕 ${estilo}`;
        comboEstilo.appendChild(opt);
    });
}

function actualizarTallas() {
    const estiloSel = document.getElementById('estilo').value;
    const comboTalla = document.getElementById('talla');
    const comboOperacion = document.getElementById('operacion');
    const divResultados = document.getElementById('resultados');

    comboTalla.innerHTML = '<option value="">⚔️ Seleccione una talla...</option>';
    comboOperacion.innerHTML = '<option value="">⚙️ Seleccione una operación...</option>';
    comboOperacion.disabled = true;
    divResultados.style.display = "none";

    if(estiloSel) {
        comboTalla.disabled = false;
        const tallasFiltradas = [...new Set(bddMetas.filter(item => item.estilo === estiloSel).map(item => item.talla).filter(Boolean))];
        tallasFiltradas.sort().forEach(talla => {
            let opt = document.createElement('option');
            opt.value = talla; opt.innerHTML = `📐 Talla ${talla}`;
            comboTalla.appendChild(opt);
        });
    } else { comboTalla.disabled = true; }
}

function actualizarOperaciones() {
    const estiloSel = document.getElementById('estilo').value;
    const tallaSel = document.getElementById('talla').value;
    const comboOperacion = document.getElementById('operacion');
    const divResultados = document.getElementById('resultados');

    comboOperacion.innerHTML = '<option value="">👒 𓊝 Seleccione una operación...</option>';
    divResultados.style.display = "none";

    if(tallaSel) {
        comboOperacion.disabled = false;
        const operacionesFiltradas = [...new Set(bddMetas.filter(item => item.estilo === estiloSel && item.talla === tallaSel).map(item => item.operacion).filter(Boolean))];
        operacionesFiltradas.sort().forEach(op => {
            let opt = document.createElement('option');
            opt.value = op; opt.innerHTML = `⚙️ ${op}`;
            comboOperacion.appendChild(opt);
        });
    } else { comboOperacion.disabled = true; }
}

function calcularMetasTiempoReal() {
    const e = document.getElementById('estilo').value;
    const t = document.getElementById('talla').value;
    const o = document.getElementById('operacion').value;
    const divResultados = document.getElementById('resultados');

    if(!e || !t || !o) { 
        divResultados.style.display = "none";
        return; 
    }

    const registro = bddMetas.find(item => item.estilo === e && item.talla === t && item.operacion === o);

    if(registro) {
        const metaDocenas = registro.metaDocenas;
        const docenasPorHora = (metaDocenas / HORAS_TURNO).toFixed(2);
        const piezasPorMinuto = ((metaDocenas * 12) / (HORAS_TURNO * 60)).toFixed(2);

        document.getElementById('resMeta').innerText = `${metaDocenas} 💰`;
        document.getElementById('resDozenHora').innerText = `${docenasPorHora} 📦`;
        document.getElementById('resPzasMin').innerText = `${piezasPorMinuto} ⚡`;
        divResultados.style.display = "block";
    } else {
        divResultados.style.display = "none";
    }
}
</script>
</body>
</html>
